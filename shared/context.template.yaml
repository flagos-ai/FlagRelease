# ============================================================================
# Issue 记录 (由 issue_reporter.py 写入)
# ============================================================================
issues:
  submitted: []               # 已提交的 issue 列表

# ============================================================================
# 元数据
# ============================================================================
metadata:
  created_by: ""          # 创建此文件的 skill 名称
  updated_at: ""          # 最后更新时间
